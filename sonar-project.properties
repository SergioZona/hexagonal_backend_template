# SonarCloud — free tier, runs only on main branch (see ci.yml)
sonar.projectKey=your-org_hexagonal-backend-template
sonar.organization=your-org

sonar.sources=src
sonar.tests=tests
sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,**/migrations/**,**/*.pyc

# Quality gate
sonar.qualitygate.wait=true
