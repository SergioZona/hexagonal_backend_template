name: hexagonal-local

# Local development compose — for running integration tests with a real Postgres.
# Usage:
#   make docker-up          → start Postgres
#   make test-integration   → run integration tests against it
#   make docker-down        → stop and remove containers

services:
  postgres:
    image: postgres:17-alpine
    container_name: hexagonal_postgres_local
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: localpassword # local dev only — not a real secret
      POSTGRES_DB: app_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d app_test" ]
      interval: 10s
      timeout: 5s
      retries: 5
  # Optional: Uncomment to run the app locally against the local DB
  # app:
  #   build: .
  #   container_name: hexagonal_app_local
  #   env_file:
  #     - src/env/DEV.env
  #   environment:
  #     DATABASE_HOST: postgres
  #     DATABASE_PASSWORD: localpassword   # inject secret at runtime
  #     SECRET_KEY: local-dev-secret       # inject secret at runtime
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
