name: hexagonal-sonar

services:
  sonarqube:
    image: sonarqube:${SONAR_IMAGE_VERSION:-community}
    container_name: hexagonal_sonarqube
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-postgres:5432/${POSTGRES_DB:-sonar}
      - SONAR_JDBC_USERNAME=${POSTGRES_USER:-sonar}
      - SONAR_JDBC_PASSWORD=${POSTGRES_PASSWORD}
      - SONAR_CORE_SERVERBASEURL=${SONAR_HOST_URL:-http://localhost:9000}
    ports:
      - "${SONAR_PORT:-9000}:9000"
    volumes:
      - hexagonal_sonar_data:/opt/sonarqube/data
      - hexagonal_sonar_extensions:/opt/sonarqube/extensions
      - hexagonal_sonar_logs:/opt/sonarqube/logs
    depends_on:
      sonar-postgres:
        condition: service_healthy
    restart: unless-stopped

  sonar-postgres:
    image: postgres:${POSTGRES_IMAGE_VERSION:-17-alpine}
    container_name: hexagonal_sonar_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sonar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sonar}
    volumes:
      - hexagonal_sonar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonar} -d ${POSTGRES_DB:-sonar}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hexagonal_sonar_data:
  hexagonal_sonar_extensions:
  hexagonal_sonar_logs:
  hexagonal_sonar_pg_data:
